name: Update repo stats

on:
  schedule:
    # every 14 days at 00:00 UTC
    - cron: '0 0 */14 * *'
  workflow_dispatch: {}

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate stats and badges
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/generate_stats.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add STATS.md assets/badges || true
          if ! git diff --cached --quiet; then
            git commit -m "ci(stats): update repo stats and static badges"
            git push
          else
            echo "No changes to commit"
          fi
